<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Creators Live — Reports</title>
<style>
:root{--navy:#1F3864;--blue:#2E5496;--ink:#1f2430;--mut:#7a8190;--line:#e6e9ef;--bg:#eef1f5;--card:#fff;}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;font-family:'Segoe UI',Arial,Helvetica,sans-serif;color:var(--ink);background:var(--bg);}
.app{display:flex;flex-direction:column;height:100vh;}
header{background:var(--navy);color:#fff;padding:12px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
header .logo{font-size:17px;font-weight:700;letter-spacing:.02em;}
header .logo span{color:#9fc0ef;font-weight:400;}
header .meta{margin-left:auto;font-size:12px;color:#c3d2ea;display:flex;align-items:center;gap:14px;}
header .meta button{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;}
header .meta button:hover{background:rgba(255,255,255,.24);}
nav{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 14px;overflow-x:auto;box-shadow:0 1px 3px rgba(20,30,50,.05);}
nav button{border:none;background:none;padding:13px 18px;font-size:13.5px;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-weight:600;font-family:inherit;}
nav button:hover{color:var(--navy);}
nav button.active{color:var(--navy);border-bottom-color:var(--blue);}
.frames{flex:1;position:relative;background:var(--bg);}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:var(--bg);display:none;}
iframe.active{display:block;}
</style></head>
<body><div class="app">
<header>
  <div class="logo">Wealth Creators Live <span>· Reports</span></div>
  <div class="meta"><span id="updated"></span><button onclick="location.reload()">↻ Refresh</button></div>
</header>
<nav id="tabs"></nav>
<div class="frames" id="frames"></div>
</div>
<script>
const REPORTS=[
  {id:"campaign", label:"Campaign Income (Report #1)", src:"Consolidated Sales Report.html"},
  {id:"summary2026", label:"2026 Sales Summary", src:"WCL 2026 Sales Summary.html"},
  {id:"lowticket", label:"Low Ticket Sales", src:"WCL Low Ticket Sales.html"},
  {id:"linda", label:"Funded by Linda", src:"WCL Funded by Linda.html"},
];
const tabs=document.getElementById('tabs'), frames=document.getElementById('frames');
REPORTS.forEach((r,i)=>{
  const b=document.createElement('button'); b.textContent=r.label; b.dataset.id=r.id;
  const f=document.createElement('iframe'); f.dataset.id=r.id; f.loading="lazy";
  if(i===0){b.classList.add('active'); f.classList.add('active'); f.src=r.src;}
  b.onclick=()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('iframe').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    if(!f.src) f.src=r.src;          // lazy-load on first open
    f.classList.add('active');
  };
  tabs.appendChild(b); frames.appendChild(f);
});
document.getElementById('updated').textContent="Updated "+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
</script>
</body></html>
